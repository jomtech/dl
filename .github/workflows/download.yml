name: Video Downloader and Uploader

on:
  workflow_dispatch:
    inputs:
      m3u8_url:
        description: "m3u8 URL (直接DLできない場合でも、TSファイルの相対パス解決のために必要です)"
        required: true
        type: string
      output_name:
        description: "Output filename (without extension)"
        required: true
        type: string
      m3u8_text_url:
        description: "m3u8の中身を置いたGistのRaw URL等 (直接DLできない場合のみ)"
        required: false
        type: string
      serial_mode:
        description: "Serial Mode (429 Avoidance)"
        required: false
        type: boolean
        default: false

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 ffmpeg parallel

          curl -sL "https://dl.filippo.io/age/latest?for=linux/amd64" -o age.tar.gz
          tar -xzf age.tar.gz
          sudo mv age/age /usr/local/bin/

      - name: Setup Secrets
        run: |
          # GitHubのSecretsからageの受信者鍵を設定
          echo "${{ secrets.AGE_RECIPIENT }}" > recipient.txt

      - name: Run script (Download & Encrypt)
        env:
          SKIP_UPLOAD: "true"
        run: |
          # 実行権限を与えてスクリプトを実行
          chmod +x ./download.sh

          OPTIONS=""
          if [ "${{ inputs.serial_mode }}" = "true" ]; then
            OPTIONS="-s"
          fi

          # GistなどのRaw URLが指定されている場合は、そこからm3u8をダウンロードして -l オプションを追加
          if [ -n "${{ inputs.m3u8_text_url }}" ]; then
            curl -sL "${{ inputs.m3u8_text_url }}" > local_input.m3u8
            OPTIONS="$OPTIONS -l local_input.m3u8"
          fi

          ./download.sh $OPTIONS "${{ inputs.m3u8_url }}" "${{ inputs.output_name }}"

      - name: Upload encrypted file to GitHub Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: encrypted-video
          path: ${{ env.AGE_FILE_PATH }}
          retention-days: 1
          if-no-files-found: error

  upload:
    needs: download
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: encrypted-video

      - name: Install Hugging Face Hub
        run: pip install --no-cache-dir huggingface_hub huggingface_hub[hf_xet]

      - name: Upload to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_XET_HIGH_PERFORMANCE: "1"
        run: |
          AGE_FILE=$(ls *.age | head -n 1)
          if [ -z "$AGE_FILE" ]; then
            echo "エラー: 暗号化ファイルが見つかりません"
            exit 1
          fi
          echo "Hugging Faceへ暗号化ファイル（$AGE_FILE）を高速アップロード中..."
          hf upload jomdel0/ud-open "$AGE_FILE" --repo-type=dataset
          echo "完了: $AGE_FILE をアップロードしました。"
